on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: R-CMD-check

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # rmoriebricklayer lives in a subdirectory of its repo, which pak cannot
      # resolve from the DESCRIPTION Remotes/Additional_repositories. It IS
      # built on r-universe, so pre-install it from there before pak resolves
      # the rest; pak then treats it as already satisfied.
      - name: Pre-install rmorie-family r-universe deps
        run: install.packages(c("rmorie", "rmoriebricklayer", "rmoriedata"), repos = c("https://rootcoder007.r-universe.dev", "https://packagemanager.posit.co/cran/latest"))
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::roxygen2
          cache: 'always'
          cache-version: 2
          needs: check

      - name: Roxygenise
        run: Rscript -e 'roxygen2::roxygenise()'
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
