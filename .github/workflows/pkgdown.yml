name: pkgdown
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: pkgdown-${{ github.ref }}
  cancel-in-progress: false
jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Pre-install r-universe deps (re-exported packages)
        run: install.packages(c("rmorie", "rmoriebricklayer", "rmoriedata"), repos = c("https://rootcoder007.r-universe.dev", "https://packagemanager.posit.co/cran/latest"))
        shell: Rscript {0}
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::roxygen2
          needs: website
      - name: Roxygenise (generate man/ for re-exports)
        run: roxygen2::roxygenise()
        shell: Rscript {0}
      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
